<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classificador B3 — Values</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #fff; --border: #e2e2df; --border-strong: #c8c8c4;
    --text: #1a1a18; --text-muted: #888880; --accent: #1a56db; --accent-bg: #eff6ff;
    --accent-border: #bfdbfe; --success: #15803d; --success-bg: #f0fdf4; --success-border: #bbf7d0;
    --warn: #b45309; --warn-bg: #fffbeb; --warn-border: #fde68a;
    --danger-bg: #fef2f2; --danger: #b91c1c; --danger-border: #fecaca; --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo h1 { font-size: 20px; font-weight: 700; color: #0a2463; }
  .login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .login-box label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .login-box input { width: 100%; height: 42px; padding: 0 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: inherit; margin-bottom: 16px; }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .btn-login { width: 100%; height: 42px; background: #0a2463; color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-login:hover { background: #0d2d7a; }
  .login-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }

  /* APP */
  .header { background: #0a2463; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 15px; font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-right span { font-size: 13px; opacity: .6; }
  .btn-logout { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); border-radius: var(--radius); height: 30px; padding: 0 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-logout:hover { background: rgba(255,255,255,.25); }
  .container { max-width: 920px; margin: 0 auto; padding: 24px 16px; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 14px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-radius: 0; border-left: none; border-right: none; border-top: none; height: auto; font-family: inherit; }
  .tab:hover { color: var(--text); background: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; resize: vertical; min-height: 180px; line-height: 1.6; color: var(--text); background: #fafaf9; }
  textarea:focus { outline: none; border-color: var(--accent); }
  input[type="text"] { width: 100%; height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: #fafaf9; color: var(--text); }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  button { height: 38px; padding: 0 18px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: #fff; color: var(--text); transition: background .15s; }
  button:hover { background: var(--bg); }
  button:active { transform: scale(.98); }
  .btn-primary { background: #0a2463; color: #fff; border-color: #0a2463; font-weight: 500; }
  .btn-primary:hover { background: #0d2d7a; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { height: 30px; padding: 0 12px; font-size: 13px; }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }
  .btn-danger:hover { background: #fee2e2; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .result-header { background: var(--accent-bg); border-bottom: 1px solid var(--accent-border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .result-subtema { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .result-tema { font-size: 17px; font-weight: 600; color: var(--accent); }
  .result-body { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result-field.full { grid-column: 1 / -1; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .field-value { font-size: 14px; color: var(--text); background: #fafaf9; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; line-height: 1.5; }
  .field-value.positiva { background: var(--success-bg); border-color: var(--success-border); color: var(--success); font-weight: 600; }
  .field-value.negativa { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); font-weight: 600; }
  .field-value.neutra { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); font-weight: 600; }
  .field-value.warn { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
  .field-value.pauta { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); font-weight: 600; }
  .field-value.pv-sim { background: var(--success-bg); border-color: var(--success-border); color: var(--success); font-weight: 600; }
  .field-value.pv-nao { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); }
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .alert-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
  .alert-ok { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .loading { display: flex; align-items: center; gap: 10px; padding: 20px; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview-box { background: #fafaf9; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-top: 12px; font-size: 13px; color: var(--text-muted); max-height: 120px; overflow-y: auto; line-height: 1.5; }
  .preview-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .desaprovada { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 16px; }
  .desaprovada h3 { color: var(--danger); font-size: 16px; margin-bottom: 8px; }
  .desaprovada p { color: var(--text-muted); font-size: 14px; }
  .pauta-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; gap: 12px; }
  .pauta-titulo { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .pauta-desc { font-size: 13px; color: var(--text-muted); }
  .pauta-empty { text-align: center; padding: 24px; color: var(--text-muted); font-size: 14px; }
  .hist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hist-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  .hist-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .hist-table tr:last-child td { border-bottom: none; }
  .hist-table tr:hover td { background: #fafaf9; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-blue { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .badge-green { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .badge-red { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
  .hist-titulo { font-weight: 500; color: var(--text); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 14px; }
  @media (max-width: 600px) { .result-body { grid-template-columns: 1fr; } .result-field.full { grid-column: 1; } }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="tela-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>Classificador B3</h1>
      <p>Values News Intelligence</p>
    </div>
    <div id="login-error" style="display:none" class="login-error"></div>
    <label for="senha">Senha de acesso</label>
    <input type="password" id="senha" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter') entrar()">
    <button class="btn-login" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="tela-app" style="display:none">
  <div class="header">
    <h1>Classificador de Clipping — B3</h1>
    <div class="header-right">
      <span>Values Comunicação</span>
      <button class="btn-logout" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="trocarAba('texto')">Colar texto</button>
      <button class="tab" onclick="trocarAba('pautas')">Pautas ativas</button>
      <button class="tab" onclick="trocarAba('historico')">Histórico</button>
    </div>

    <!-- ABA TEXTO -->
    <div id="aba-texto">
      <div class="card">
        <label for="txt">Texto da matéria</label>
        <textarea id="txt" placeholder="Cole aqui o título e texto completo da matéria..."></textarea>
        <div class="row">
          <button class="btn-primary" id="btn-analisar" onclick="analisar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Analisar
          </button>
          <button onclick="limpar()">Limpar</button>
        </div>
      </div>
    </div>



    <!-- ABA PAUTAS -->
    <div id="aba-pautas" style="display:none">
      <div class="card">
        <label>Cadastrar nova pauta</label>
        <input type="text" id="pauta-titulo" placeholder="Nome da pauta em caixa alta (ex: LANÇAMENTO DO ECOSSISTEMA DE DUPLICATAS ESCRITURAIS)" style="margin-bottom:8px">
        <textarea id="pauta-desc" placeholder="Descrição opcional — contexto da pauta para ajudar na identificação automática..." style="min-height:80px;margin-top:8px"></textarea>
        <div class="row">
          <button class="btn-primary" onclick="cadastrarPauta()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Cadastrar pauta
          </button>
        </div>
      </div>
      <div class="card">
        <label>Pautas cadastradas</label>
        <div id="lista-pautas"><div class="pauta-empty">Carregando...</div></div>
      </div>
    </div>

    <!-- ABA HISTÓRICO -->
    <div id="aba-historico" style="display:none">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <label style="margin:0">Análises realizadas</label>
          <button class="btn-sm btn-danger" onclick="limparHistorico()">Limpar histórico</button>
        </div>
        <div id="lista-historico"><div class="hist-empty">Carregando...</div></div>
      </div>
    </div>

    <div id="status"></div>
    <div id="resultado"></div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('b3_token') || '';

// --- AUTH ---
async function entrar() {
  const senha = document.getElementById('senha').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Senha incorreta');
    TOKEN = data.token;
    localStorage.setItem('b3_token', TOKEN);
    mostrarApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

async function sair() {
  await apiFetch('/logout', { method: 'POST' });
  TOKEN = '';
  localStorage.removeItem('b3_token');
  document.getElementById('tela-app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
  document.getElementById('senha').value = '';
}

function mostrarApp() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('tela-app').style.display = 'block';
}

async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'x-session-token': TOKEN, ...(opts.headers || {}) };
  const r = await fetch(url, { ...opts, headers });
  if (r.status === 401) { sair(); throw new Error('Sessão expirada. Faça login novamente.'); }
  return r;
}

// Verificar se já tem token válido ao carregar
window.addEventListener('load', async () => {
  if (TOKEN) {
    try {
      const r = await fetch('/pautas', { headers: { 'x-session-token': TOKEN } });
      if (r.ok) { mostrarApp(); return; }
    } catch {}
  }
  TOKEN = '';
  localStorage.removeItem('b3_token');
});

document.getElementById('senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') entrar();
});

// --- ABAS ---
function trocarAba(aba) {
  ['texto','pautas','historico'].forEach(a => {
    document.getElementById('aba-' + a).style.display = a === aba ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['texto','pautas','historico'][i] === aba);
  });
  document.getElementById('status').innerHTML = '';
  if (aba === 'pautas') carregarPautas();
  if (aba === 'historico') carregarHistorico();
}

// --- PAUTAS ---
async function carregarPautas() {
  const el = document.getElementById('lista-pautas');
  try {
    const r = await apiFetch('/pautas');
    const pautas = await r.json();
    if (!pautas.length) {
      el.innerHTML = '<div class="pauta-empty">Nenhuma pauta cadastrada.</div>';
      return;
    }
    el.innerHTML = pautas.map(p => `
      <div class="pauta-item">
        <div style="flex:1">
          <div class="pauta-titulo">${p.titulo}</div>
          ${p.descricao ? `<div class="pauta-desc">${p.descricao}</div>` : ''}
        </div>
        <button class="btn-sm btn-danger" onclick="removerPauta(${p.id})">Remover</button>
      </div>`).join('');
  } catch(e) { el.innerHTML = `<div class="pauta-empty">Erro: ${e.message}</div>`; }
}

async function cadastrarPauta() {
  const titulo = document.getElementById('pauta-titulo').value.trim();
  const descricao = document.getElementById('pauta-desc').value.trim();
  if (!titulo) { alert('Informe o título da pauta.'); return; }
  try {
    const r = await apiFetch('/pautas', {
      method: 'POST',
      body: JSON.stringify({ titulo, descricao })
    });
    if (!r.ok) throw new Error();
    document.getElementById('pauta-titulo').value = '';
    document.getElementById('pauta-desc').value = '';
    carregarPautas();
    document.getElementById('status').innerHTML = '<div class="alert alert-ok">Pauta cadastrada.</div>';
    setTimeout(() => document.getElementById('status').innerHTML = '', 3000);
  } catch { alert('Erro ao cadastrar pauta.'); }
}

async function removerPauta(id) {
  if (!confirm('Remover esta pauta?')) return;
  await apiFetch('/pautas/' + id, { method: 'DELETE' });
  carregarPautas();
}

// --- HISTÓRICO ---
async function carregarHistorico() {
  const el = document.getElementById('lista-historico');
  try {
    const r = await apiFetch('/historico');
    const hist = await r.json();
    if (!hist.length) {
      el.innerHTML = '<div class="hist-empty">Nenhuma análise registrada ainda.</div>';
      return;
    }
    el.innerHTML = `<table class="hist-table">
      <thead><tr>
        <th>Data</th><th>Veículo</th><th>Matéria</th><th>Subtema</th><th>Qualitativo</th><th>Status</th>
      </tr></thead>
      <tbody>${hist.map(h => {
        const data = new Date(h.ts).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        const qualClass = h.aprovada && h.resultado ? (h.resultado['id_9791'] || '').toLowerCase() : '';
        return `<tr>
          <td style="white-space:nowrap;font-size:12px">${data}</td>
          <td style="font-size:12px;color:var(--text-muted)">${h.veiculo || '—'}</td>
          <td><div class="hist-titulo" title="${h.titulo}">${h.titulo}</div></td>
          <td>${h.aprovada && h.resultado ? `<span class="badge badge-blue">${h.resultado['id_9888'] || '—'}</span>` : '—'}</td>
          <td>${h.aprovada && h.resultado ? `<span class="badge ${qualClass === 'positiva' ? 'badge-green' : qualClass === 'negativa' ? 'badge-red' : 'badge-blue'}">${h.resultado['id_9791'] || '—'}</span>` : '—'}</td>
          <td>${h.aprovada ? '<span class="badge badge-green">Aprovada</span>' : '<span class="badge badge-red">Desaprovada</span>'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<div class="hist-empty">Erro: ${e.message}</div>`; }
}

async function limparHistorico() {
  if (!confirm('Limpar todo o histórico? Esta ação não pode ser desfeita.')) return;
  await apiFetch('/historico', { method: 'DELETE' });
  carregarHistorico();
}

// --- CLASSIFICAÇÃO ---
function limpar() {
  document.getElementById('txt').value = '';
  document.getElementById('resultado').innerHTML = '';
  document.getElementById('status').innerHTML = '';
}

async function analisar() {
  const txt = document.getElementById('txt').value.trim();
  if (!txt) { alert('Cole o texto da matéria.'); return; }
  const btn = document.getElementById('btn-analisar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analisando...';
  document.getElementById('status').innerHTML = '';
  document.getElementById('resultado').innerHTML = '<div class="loading"><div class="spinner"></div> Classificando com IA...</div>';
  try {
    const r = await apiFetch('/classificar', {
      method: 'POST',
      body: JSON.stringify({ texto: txt, titulo_noticia: txt.slice(0, 120) })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (data.aprovada === false) { renderDesaprovada(); return; }
    renderResultado(parseResultado(data.resultado));
  } catch(e) {
    document.getElementById('resultado').innerHTML = '';
    document.getElementById('status').innerHTML = `<div class="alert alert-error">Erro: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Analisar';
  }
}

async function buscarPorId() {
  const id = document.getElementById('noticia-id').value.trim();
  if (!id) { alert('Informe o ID da notícia.'); return; }
  const btn = document.getElementById('btn-buscar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Buscando...';
  document.getElementById('preview-noticia').innerHTML = '';
  document.getElementById('resultado').innerHTML = '';
  document.getElementById('status').innerHTML = '';

  try {
    const r = await apiFetch(`/buscar-noticia?id=${encodeURIComponent(id)}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('preview-noticia').innerHTML = `
      <div class="preview-box">
        <div class="preview-title">${data.titulo}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${data.veiculo} · ${data.data}</div>
        ${data.texto.slice(0,400)}${data.texto.length > 400 ? '...' : ''}
      </div>`;

    btn.innerHTML = '<div class="spinner"></div> Classificando...';
    document.getElementById('resultado').innerHTML = '<div class="loading"><div class="spinner"></div> Classificando com IA...</div>';

    const r2 = await apiFetch('/classificar', {
      method: 'POST',
      body: JSON.stringify({ texto: `${data.titulo}\n\n${data.texto}`, veiculo: data.veiculo, titulo_noticia: data.titulo })
    });
    const data2 = await r2.json();
    if (data2.error) throw new Error(data2.error);
    if (data2.aprovada === false) { renderDesaprovada(); return; }
    renderResultado(parseResultado(data2.resultado));
  } catch(e) {
    document.getElementById('resultado').innerHTML = '';
    document.getElementById('status').innerHTML = `<div class="alert alert-error">Erro: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Buscar e analisar';
  }
}

function parseResultado(r) {
  if (typeof r === 'object' && r !== null) return r;
  try { return JSON.parse((r || '').replace(/```json|```/g, '').trim()); } catch { return {}; }
}

function renderDesaprovada() {
  document.getElementById('resultado').innerHTML = `
    <div class="desaprovada">
      <h3>Matéria não aprovada</h3>
      <p>A matéria não tem relação com a B3, seu mercado, concorrentes ou temas de interesse estratégico do mercado financeiro brasileiro.</p>
    </div>`;
}

function renderResultado(p) {
  const qual = (p['id_9791'] || '').toUpperCase();
  const qualClass = qual.includes('POSITIVA') ? 'positiva' : qual.includes('NEGATIVA') ? 'negativa' : qual.includes('NEUTRA') ? 'neutra' : '';
  const hasPauta = p['id_9793'] && p['id_9793'] !== 'null' && p['id_9793'] !== null;
  const hasPV = p['id_9897'] && p['id_9897'] !== 'null' && p['id_9897'] !== null;
  const expl9791 = p['explicacao-id_9791'] || '';
  const alertaMatch = expl9791.match(/\|\s*Alerta:\s*(.+)/s);
  const alerta = alertaMatch ? alertaMatch[1].trim() : null;
  const explicacao = expl9791.replace(/\|\s*Alerta:.+/s, '').trim();

  document.getElementById('resultado').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="result-subtema">Subtema</div>
          <div class="result-tema">${p['id_9888'] || '—'}</div>
        </div>
        <button class="btn-sm" onclick="copiar()">Copiar resultado</button>
      </div>
      <div class="result-body">
        <div class="result-field">
          <div class="field-label">Sugestão de Temas</div>
          <div class="field-value">${p['id_9902'] || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">Qualitativo Institucional</div>
          <div class="field-value ${qualClass}">${p['id_9791'] || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">Citação no Título</div>
          <div class="field-value">${p['id_9821'] || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">Citação da Marca</div>
          <div class="field-value">${p['id_9901'] || '—'}</div>
        </div>
        ${hasPauta ? `
        <div class="result-field full">
          <div class="field-label">Pauta identificada</div>
          <div class="field-value pauta">${p['id_9793']}</div>
        </div>` : ''}
        <div class="result-field full">
          <div class="field-label">Porta Vozes</div>
          <div class="field-value ${hasPV ? 'pv-sim' : 'pv-nao'}">${hasPV ? p['id_9897'] : 'Nenhum porta-voz citado'}</div>
        </div>
        <div class="result-field full">
          <div class="field-label">Justificativa</div>
          <div class="field-value">${explicacao || p['explicacao-id_9888'] || '—'}</div>
        </div>
        ${alerta ? `
        <div class="result-field full">
          <div class="field-label" style="color:var(--warn)">Alerta estratégico</div>
          <div class="field-value warn">${alerta}</div>
        </div>` : ''}
      </div>
    </div>`;
  window._lastResult = p;
}

function copiar() {
  const p = window._lastResult;
  if (!p) return;
  const linhas = [
    `SUBTEMA: ${p['id_9888'] || ''}`,
    `SUGESTÃO DE TEMAS: ${p['id_9902'] || ''}`,
    `QUALITATIVO INSTITUCIONAL: ${p['id_9791'] || ''}`,
    `CITAÇÃO NO TÍTULO: ${p['id_9821'] || ''}`,
    `CITAÇÃO DA MARCA: ${p['id_9901'] || ''}`,
    p['id_9793'] ? `PAUTA: ${p['id_9793']}` : '',
    p['id_9897'] ? `PORTA VOZES: ${p['id_9897']}` : '',
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(linhas).then(() => {
    document.getElementById('status').innerHTML = '<div class="alert alert-ok">Resultado copiado.</div>';
    setTimeout(() => document.getElementById('status').innerHTML = '', 2500);
  });
}
</script>
</body>
</html>
