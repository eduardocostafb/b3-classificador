<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classificador de Clipping — B3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e2e2df;
    --border-strong: #c8c8c4;
    --text: #1a1a18;
    --text-muted: #888880;
    --accent: #1a56db;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --success: #15803d;
    --success-bg: #f0fdf4;
    --warn: #b45309;
    --warn-bg: #fffbeb;
    --warn-border: #fde68a;
    --danger-bg: #fef2f2;
    --danger: #b91c1c;
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: #0a2463; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header img { height: 32px; filter: brightness(0) invert(1); }
  .header h1 { font-size: 16px; font-weight: 500; }
  .header span { font-size: 13px; opacity: .6; margin-left: auto; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; resize: vertical; min-height: 200px; line-height: 1.6; color: var(--text); background: #fafaf9; transition: border-color .15s; }
  textarea:focus { outline: none; border-color: var(--accent); background: #fff; }
  .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  button { height: 38px; padding: 0 18px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: #fff; color: var(--text); transition: background .15s; }
  button:hover { background: var(--bg); }
  button:active { transform: scale(.98); }
  .btn-primary { background: #0a2463; color: #fff; border-color: #0a2463; font-weight: 500; }
  .btn-primary:hover { background: #0d2d7a; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-sm { height: 30px; padding: 0 12px; font-size: 13px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .result-header { background: var(--accent-bg); border-bottom: 1px solid var(--accent-border); padding: 14px 20px; }
  .result-tema { font-size: 17px; font-weight: 600; color: var(--accent); }
  .result-body { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result-field { }
  .result-field.full { grid-column: 1 / -1; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .field-value { font-size: 14px; color: var(--text); background: #fafaf9; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; line-height: 1.5; }
  .field-value.mono { font-family: monospace; font-size: 13px; }
  .field-value.warn { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
  .conf-row { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .conf-label { font-size: 12px; color: var(--text-muted); min-width: 130px; }
  .conf-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .conf-bar { height: 100%; border-radius: 3px; transition: width .4s; }
  .conf-pct { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .alert-error { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }
  .alert-ok { background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
  .loading { display: flex; align-items: center; gap: 10px; padding: 20px; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hist-section { }
  .hist-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; gap: 12px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:hover .hist-noticia { color: var(--accent); }
  .hist-noticia { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-blue { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .hist-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .copy-btn { float: right; }
  @media (max-width: 600px) { .result-body { grid-template-columns: 1fr; } .result-field.full { grid-column: 1; } }
</style>
</head>
<body>

<div class="header">
  <h1>Classificador de Clipping</h1>
  <span>B3 — Values Comunicação</span>
</div>

<div class="container">

  <div class="card">
    <label for="txt">Texto da matéria</label>
    <textarea id="txt" placeholder="Cole aqui o título e texto completo da matéria..."></textarea>
    <div class="row">
      <button class="btn-primary" id="btn-analisar" onclick="analisar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Analisar
      </button>
      <button onclick="limpar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Limpar
      </button>
    </div>
  </div>

  <div id="status"></div>
  <div id="resultado"></div>

  <div class="card" id="hist-card" style="display:none">
    <div class="hist-section">
      <div class="hist-title">Histórico da sessão</div>
      <div id="historico"></div>
    </div>
  </div>

</div>

<script>
const ID_MAP = {'1':38039,'2':37877,'3':38019,'4':37869,'5':37881,'6':37888,'7':37879,'8':37886,'9':38038,'10':37889,'11':37891,'12':37860};
let historico = [];

function limpar(){
  document.getElementById('txt').value = '';
  document.getElementById('resultado').innerHTML = '';
  document.getElementById('status').innerHTML = '';
}

async function analisar(){
  const txt = document.getElementById('txt').value.trim();
  if(!txt){ alert('Cole o texto da matéria.'); return; }

  const btn = document.getElementById('btn-analisar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analisando...';
  document.getElementById('status').innerHTML = '';
  document.getElementById('resultado').innerHTML = '<div class="loading"><div class="spinner"></div> Classificando com IA...</div>';

  try {
    const r = await fetch('/classificar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: txt })
    });
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    const p = parse(data.resultado);
    const conf = calcConf(p);
    historico.unshift({ texto: txt.slice(0,90)+'...', result: p, ts: new Date() });
    renderResultado(p, conf);
    renderHistorico();
  } catch(e) {
    document.getElementById('resultado').innerHTML = '';
    document.getElementById('status').innerHTML = `<div class="alert alert-error">Erro: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Analisar';
  }
}

function parse(txt){
  const g = l => {
    const m = txt.match(new RegExp(l + ':\\s*(.+?)(?=\\n[A-ZÇÃÕ]|$)', 'si'));
    return m ? m[1].trim() : '';
  };
  const tema = g('TEMA');
  const tnum = (tema.match(/^(\d+)/)||[])[1] || '';
  return {
    tema, tnum,
    subtema: g('SUBTEMA'),
    assunto: g('ASSUNTO'),
    gatilho: g('GATILHO IDENTIFICADO'),
    just: g('JUSTIFICATIVA'),
    avaliacao: g('AVALIAÇÃO QUALITATIVA'),
    avaliacaoJust: g('JUSTIFICATIVA DA AVALIAÇÃO'),
    sugestaoPV: g('SUGESTÃO DE PORTA-VOZ'),
    pv: g('PORTA-VOZ NÃO MAPEADO'),
    alerta: g('ALERTA ESTRATÉGICO'),
    id_akaii: ID_MAP[tnum] || null
  };
}

function calcConf(p){
  let s = 0;
  if(p.tnum) s += 40;
  if(p.subtema) s += 20;
  if(p.gatilho && p.gatilho.length > 3) s += 25;
  if(p.just && p.just.length > 20) s += 15;
  return Math.min(s, 100);
}

function confColor(c){ return c >= 75 ? '#15803d' : c >= 50 ? '#b45309' : '#b91c1c'; }
function confLabel(c){ return c >= 75 ? 'Alta confiança' : c >= 50 ? 'Confiança moderada' : 'Baixa — revise'; }

function avalColor(a){
  if(!a) return '#888880';
  const v = a.toUpperCase();
  if(v.includes('POSITIVA')) return '#15803d';
  if(v.includes('NEGATIVA')) return '#b91c1c';
  return '#b45309';
}
function avalBg(a){
  if(!a) return '#fafaf9';
  const v = a.toUpperCase();
  if(v.includes('POSITIVA')) return '#f0fdf4';
  if(v.includes('NEGATIVA')) return '#fef2f2';
  return '#fffbeb';
}
function pvCitado(s){
  return s && s.toUpperCase().includes('CITADO NA MATÉRIA');
}
function pvNaoCitado(s){
  return s && s.toUpperCase().includes('NÃO CITADO');
}

function renderResultado(p, conf){
  const hasPV = p.pv && p.pv !== 'Nenhum' && p.pv.length > 2;
  const hasAlerta = p.alerta && p.alerta !== 'Nenhum' && p.alerta.length > 2;
  const hasAssunto = p.assunto && p.assunto.length > 2;
  const hasAval = p.avaliacao && p.avaliacao.length > 2;
  const hasSugestao = p.sugestaoPV && p.sugestaoPV.length > 2;

  document.getElementById('resultado').innerHTML = `
    <div class="result-card">
      <div class="result-header" style="display:flex;align-items:center;justify-content:space-between">
        <div class="result-tema">${p.tema || '—'}</div>
        <button class="btn-sm copy-btn" onclick="copiar()">Copiar resultado</button>
      </div>
      <div class="result-body">
        <div class="result-field">
          <div class="field-label">Subtema</div>
          <div class="field-value">${p.subtema || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">ID Akaii</div>
          <div class="field-value mono">${p.id_akaii || '—'}</div>
        </div>
        ${hasAssunto ? `
        <div class="result-field full">
          <div class="field-label">Assunto</div>
          <div class="field-value" style="font-weight:600;letter-spacing:.02em">${p.assunto}</div>
        </div>` : ''}
        <div class="result-field full">
          <div class="field-label">Gatilho identificado</div>
          <div class="field-value">${p.gatilho || '—'}</div>
        </div>
        <div class="result-field full">
          <div class="field-label">Justificativa</div>
          <div class="field-value">${p.just || '—'}</div>
        </div>
        ${hasAval ? `
        <div class="result-field full">
          <div class="field-label">Avaliação qualitativa institucional</div>
          <div class="field-value" style="background:${avalBg(p.avaliacao)};border-color:${avalColor(p.avaliacao)}33;color:${avalColor(p.avaliacao)};font-weight:600">
            ${p.avaliacao}${p.avaliacaoJust ? ` — ${p.avaliacaoJust}` : ''}
          </div>
        </div>` : ''}
        ${hasSugestao ? `
        <div class="result-field full">
          <div class="field-label">Porta-voz citado na matéria</div>
          <div class="field-value" style="${pvNaoCitado(p.sugestaoPV) ? 'background:var(--danger-bg);border-color:#fecaca;color:var(--danger);font-weight:600' : pvCitado(p.sugestaoPV) ? 'background:var(--success-bg);border-color:#bbf7d0;color:var(--success);font-weight:600' : ''}">${p.sugestaoPV}</div>
        </div>` : ''}
        ${hasPV ? `
        <div class="result-field full">
          <div class="field-label" style="color:var(--warn)">⚠ Porta-voz não mapeado</div>
          <div class="field-value warn">${p.pv}</div>
        </div>` : ''}
        ${hasAlerta ? `
        <div class="result-field full">
          <div class="field-label" style="color:var(--warn)">⚠ Alerta estratégico</div>
          <div class="field-value warn">${p.alerta}</div>
        </div>` : ''}
      </div>
      <div class="conf-row">
        <div class="conf-label">${confLabel(conf)}</div>
        <div class="conf-bar-wrap">
          <div class="conf-bar" style="width:${conf}%;background:${confColor(conf)}"></div>
        </div>
        <div class="conf-pct" style="color:${confColor(conf)}">${conf}%</div>
      </div>
    </div>
  `;
  window._lastResult = p;
}

function copiar(){
  const p = window._lastResult;
  if(!p) return;
  const txt = [
    `TEMA: ${p.tema}`,
    `SUBTEMA: ${p.subtema}`,
    p.assunto ? `ASSUNTO: ${p.assunto}` : '',
    `GATILHO: ${p.gatilho}`,
    `JUSTIFICATIVA: ${p.just}`,
    `ID AKAII: ${p.id_akaii || '—'}`,
    p.avaliacao ? `AVALIAÇÃO QUALITATIVA: ${p.avaliacao}${p.avaliacaoJust ? ' — ' + p.avaliacaoJust : ''}` : '',
    p.sugestaoPV ? `SUGESTÃO DE PORTA-VOZ: ${p.sugestaoPV}` : '',
    p.pv && p.pv !== 'Nenhum' ? `PORTA-VOZ NÃO MAPEADO: ${p.pv}` : '',
    p.alerta && p.alerta !== 'Nenhum' ? `ALERTA ESTRATÉGICO: ${p.alerta}` : ''
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('status').innerHTML = '<div class="alert alert-ok">Resultado copiado para a área de transferência.</div>';
    setTimeout(() => document.getElementById('status').innerHTML = '', 2500);
  });
}

function renderHistorico(){
  const card = document.getElementById('hist-card');
  const el = document.getElementById('historico');
  if(!historico.length){ card.style.display = 'none'; return; }
  card.style.display = 'block';
  el.innerHTML = historico.slice(0, 10).map((h, i) => `
    <div class="hist-item" onclick="carregarHist(${i})">
      <div class="hist-noticia">${h.texto}</div>
      <div class="badge badge-blue">${h.result.tnum ? h.result.tnum + '. ' + (h.result.tema.replace(/^\d+\s*[—\-]\s*/,'').split('|')[0].trim().slice(0,20)) : '—'}</div>
      <div class="hist-time">${h.ts.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>
  `).join('');
}

function carregarHist(i){
  const h = historico[i];
  renderResultado(h.result, calcConf(h.result));
  window.scrollTo(0, 0);
}

document.getElementById('txt').addEventListener('keydown', e => {
  if(e.ctrlKey && e.key === 'Enter') analisar();
});
</script>
</body>
</html>
